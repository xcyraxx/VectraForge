llm:
  base_url: "http://172.20.195.221:5000/v1"
  model: "local-model"
  temperature: 0.2
  max_tokens: 4096
  timeout: 120
  retries: 3

agent:
  max_iterations: 40
  tool_timeout: 60
  memory_max_entries: 200
  context_max_chars: 12000
  stall_threshold: 4          # iterations with no new artifact → trigger search
  log_level: "INFO"

tools:
  safe_shell: true             # whitelist-only shell commands
  network_allowed: true
  sandbox_dir: "/tmp/ctf_sandbox"
  binwalk_extract_dir: "/tmp/binwalk_out"

search:
  max_results: 5
  timeout: 15
  user_agent: "CTF-Research-Agent/1.0"

paths:
  workspace: "workspace"
  challenges: "workspace/challenges"
  logs: "workspace/logs"
